name: Laravel CI Pipeline

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  laravel-tests:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          extensions: mbstring, xml, ctype, iconv, mysql

      - name: Copy .env
        run: php -r "file_exists('.env') || copy('.env.example', '.env');"

      - name: Install Dependencies (Composer)
        run: composer install --prefer-dist --no-ansi --no-interaction --no-progress --no-scripts

      - name: Generate Application Key
        run: php artisan key:generate

      - name: Directory Permissions
        run: chmod -R 777 storage bootstrap/cache

      - name: Run Tests
        run: php artisan test

  deploy:
    needs: laravel-tests # Hanya jalan kalau CI sukses
    runs-on: ubuntu-latest
    steps:
      - name: Hubungkan ke Server & Tukar Folder
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.IP_SERVER }}
          username: ${{ secrets.USERNAME_SERVER }}
          key: ${{ secrets.KUNCI_SSH }}
          script: |
            cd /var/www/swiss-journey
            git pull origin main       # Robot ambil kode gambar baru
            php artisan config:cache   # Bersihkan cache di server